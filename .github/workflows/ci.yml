name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5     # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417     # v6.3.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461    # v2

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: bun run build
        working-directory: web

      - name: Build backend
        run: |
          go build -ldflags="-s -w \
            -X github.com/shiroha/subdux/internal/version.Version=${{ github.sha }} \
            -X github.com/shiroha/subdux/internal/version.Commit=$(echo ${{ github.sha }} | cut -c1-7) \
            -X github.com/shiroha/subdux/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o subdux ./cmd/server

      - name: Test
        run: go test ./...
