name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0     # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16     # v6.5.0
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6    # v2

      - name: Check Go formatting
        run: |
          files=$(gofmt -l $(find . -path ./web -prune -o -name '*.go' -print))
          if [ -n "$files" ]; then
            echo "Go files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Lint frontend
        run: bun run lint
        working-directory: web

      - name: Build frontend
        run: bun run build
        working-directory: web

      - name: Vet backend
        run: go vet ./...

      - name: Build backend
        run: |
          go build -ldflags="-s -w \
            -X github.com/shiroha/subdux/internal/version.Version=${{ github.sha }} \
            -X github.com/shiroha/subdux/internal/version.Commit=$(echo ${{ github.sha }} | cut -c1-7) \
            -X github.com/shiroha/subdux/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o subdux ./cmd/server

      - name: Test backend
        run: go test ./...
