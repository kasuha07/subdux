version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:10"
      timezone: Asia/Shanghai
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 5

  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "03:20"
      timezone: Asia/Shanghai
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - frontend
    open-pull-requests-limit: 5
